name: fakenews-detection-openenv
version: "1.0.0"
description: >
  Social Media Fake News Detection Environment with Multi-Signal Alert System.
  An OpenEnv-compliant RL environment where AI agents learn to detect fake news
  through step-based reasoning: claim extraction, source verification,
  cross-checking, and GREEN/YELLOW/RED alert generation.
author: "FakeNews Detection Team"
license: MIT
tags:
  - fake-news
  - content-moderation
  - social-media
  - fact-checking
  - alert-system
  - openenv

tasks:
  - id: task_easy
    name: Basic Fake News Detection
    difficulty: easy
    description: >
      Detect obvious fake news with clear conspiracy language,
      blacklisted sources (naturalnews.com), and debunked claims.
    max_steps: 6
    pass_threshold: 0.55

  - id: task_medium
    name: Partial Truth and Suspicious Content Detection
    difficulty: medium
    description: >
      Detect a post that mixes real facts with misleading framing and
      unverified claims. Agent must avoid over-alerting and under-alerting.
    max_steps: 8
    pass_threshold: 0.50

  - id: task_hard
    name: Sophisticated Disinformation Campaign Detection
    difficulty: hard
    description: >
      Detect sophisticated disinformation using true claims as credibility
      anchors while embedding a false central claim. Tests confidence
      calibration and resistance to partial-truth manipulation.
    max_steps: 10
    pass_threshold: 0.40

actions:
  - name: analyze_claim
    description: Extract and analyze a claim from the social media post
  - name: check_source
    description: Check the credibility of a source mentioned in the post
  - name: cross_verify
    description: Cross-verify a claim against the knowledge base
  - name: raise_alert
    description: Raise a final alert with a fake news classification label
  - name: mark_safe
    description: Mark the post as real and safe

observation_space:
  type: object
  properties:
    post_id: string
    post_text: string
    task_description: string
    step_number: integer
    max_steps: integer
    claims_extracted: array
    sources_checked: array
    patterns_detected: array
    cross_verifications: array
    current_fake_score: float
    current_alert: string
    available_actions: array
    message: string

reward_space:
  min: -1.0
  max: 1.0
  partial_rewards: true
  description: >
    Partial rewards throughout trajectory. Components include detection
    accuracy, alert correctness, evidence quality, action coverage,
    and efficiency. Severe penalties for marking fake posts as safe.

server:
  port: 7860
  endpoints:
    - path: /reset
      method: POST
    - path: /step
      method: POST
    - path: /state
      method: GET
    - path: /health
      method: GET