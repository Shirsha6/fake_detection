name: fakenews-detection-openenv
version: "1.0.0"
description: >
  Social Media Fake News Detection Environment with Multi-Signal Alert System.
  An OpenEnv-compliant reinforcement learning environment where AI agents
  learn to detect fake news through step-based reasoning: claim extraction,
  source verification, cross-checking, and alert generation.

author: "FakeNews Detection Team"
license: MIT

# Environment metadata
environment:
  id: fakenews-detection-v1
  type: text
  domain: content-moderation
  tags:
    - fake-news
    - fact-checking
    - content-moderation
    - social-media
    - alert-system
    - multi-signal

# Tasks
tasks:
  - id: task_easy
    name: "Basic Fake News Detection"
    difficulty: easy
    max_steps: 6
    pass_threshold: 0.65
    description: >
      Detect obvious fake news with clear conspiracy language,
      blacklisted sources, and debunked claims.

  - id: task_medium
    name: "Partial Truth & Suspicious Content Detection"
    difficulty: medium
    max_steps: 8
    pass_threshold: 0.60
    description: >
      Detect mixed-truth posts that combine real facts with misleading
      framing and unverified claims. Avoid over/under-alerting.

  - id: task_hard
    name: "Sophisticated Disinformation Campaign Detection"
    difficulty: hard
    max_steps: 10
    pass_threshold: 0.55
    description: >
      Detect sophisticated disinformation that uses credible anchors,
      partial truths, and institutional name-dropping to disguise a
      false central claim. Tests confidence calibration.

# Action space
actions:
  - name: analyze_claim
    description: Extract and analyze a claim from the social media post
    parameters:
      target: string  # the claim text to analyze
      reasoning: string  # optional reasoning

  - name: check_source
    description: Check the credibility of a source mentioned in the post
    parameters:
      target: string  # source URL or name

  - name: cross_verify
    description: Cross-verify a claim against the knowledge base
    parameters:
      target: string  # claim to verify

  - name: raise_alert
    description: Raise a final alert with a fake news label
    parameters:
      final_label: enum[fake, likely_fake, suspicious, unknown]
      confidence: float  # 0.0-1.0

  - name: mark_safe
    description: Mark the post as real/safe
    parameters:
      final_label: enum[real]
      confidence: float  # 0.0-1.0

# Observation space
observation:
  post_id: string
  post_text: string
  task_description: string
  step_number: integer
  max_steps: integer
  claims_extracted: list[string]
  sources_checked: list[object]
  patterns_detected: list[string]
  cross_verifications: list[object]
  current_fake_score: float  # 0.0-1.0
  current_alert: enum[GREEN, YELLOW, RED]
  available_actions: list[string]
  message: string

# Reward
reward:
  range: [-1.0, 1.0]
  components:
    - detection_accuracy: "Reward for correct label detection (40%)"
    - alert_correctness: "Reward for correct alert level (25%)"
    - efficiency: "Penalty for unnecessary steps"
    - confidence_calibration: "Reward for calibrated confidence"
  partial_rewards: true
  sparse: false

# API endpoints
endpoints:
  reset:
    method: POST
    path: /reset
    body:
      task_id: string
  step:
    method: POST
    path: /step
    body:
      action_type: string
      target: string
      reasoning: string
      final_label: string
      confidence: float
      task_id: string
  state:
    method: GET
    path: /state
    query:
      task_id: string

# Deployment
deployment:
  platform: huggingface-spaces
  framework: docker
  port: 7860
  runtime:
    vcpu: 2
    memory_gb: 8
  inference_timeout_minutes: 20