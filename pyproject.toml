# pyproject.toml — FakeNews Detection OpenEnv
# Fixes for openenv validate:
#   1. [project.scripts] now has a 'server' entry pointing to server.app:main
#   2. openenv-core>=0.2.0 added to dependencies
#   3. server/app.py created with main() function
#   4. server/app.py has if __name__ == '__main__' block

# ─────────────────────────────────────────────
# BUILD SYSTEM
# ─────────────────────────────────────────────

[build-system]
requires      = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

# ─────────────────────────────────────────────
# PROJECT METADATA  (PEP 621)
# ─────────────────────────────────────────────

[project]
name            = "fakenews-detection-env"
version         = "0.2.3"
description     = "Social Media Fake News Detection RL Environment for OpenEnv"
readme          = "README.md"
license         = "MIT"
requires-python = ">=3.11"

authors = [
  { name = "Team OpenEnv Hackathon" }
]

keywords = [
  "openenv",
  "fake-news",
  "misinformation",
  "reinforcement-learning",
  "social-media",
  "rl-environment",
  "agent-evaluation",
]

classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Operating System :: OS Independent",
]

# ── FIX 2: openenv-core>=0.2.0 added ─────────
dependencies = [
  "openenv==0.1.13", # ← REQUIRED by openenv validate
  "fastapi==0.111.0",
  "uvicorn[standard]==0.29.0",
  "python-multipart==0.0.9",
  "pydantic==2.7.1",
  "openai>=2.7.2",
  "requests==2.32.2",
]

# ─────────────────────────────────────────────
# ENTRY POINTS / SCRIPTS
# ─────────────────────────────────────────────

# ── FIX 1: 'server' script entry point added ──
# openenv validate checks for a script named 'server'
# pointing to server/app.py → main()
[project.scripts]
server            = "server.app:main"    # ← REQUIRED by openenv validate
fakenews-env      = "main:main"          # convenience CLI to start server too

# ─────────────────────────────────────────────
# OPENENV TOOL CONFIG  (read by openenv validate)
# ─────────────────────────────────────────────

[tool.openenv]
name        = "fakenews-detection-env"
version     = "1.0.0"
entry_point = "server:app"
port        = 7860
framework   = "fastapi"
manifest    = "openenv.yaml"

[tool.openenv.server]
host       = "0.0.0.0"
port       = 7860
module     = "server"
app        = "app"
dockerfile = "Dockerfile"

[tool.openenv.tasks]
easy   = { ground_truth = "fake",        alert = "RED",    difficulty = "easy"   }
medium = { ground_truth = "likely_fake", alert = "RED",    difficulty = "medium" }
hard   = { ground_truth = "suspicious",  alert = "YELLOW", difficulty = "hard"   }

[tool.openenv.inference]
script          = "inference.py"
max_runtime_min = 20
min_vcpu        = 2
min_memory_gb   = 8

# ─────────────────────────────────────────────
# SETUPTOOLS CONFIG
# ─────────────────────────────────────────────

[tool.setuptools.packages.find]
where = ["."]          # scan from project root
include = ["server*"]  # include server/ package

[tool.setuptools]
py-modules = [
  "models",
  "rewards",
  "env",
  "tasks",
  "grader",
  "server",
  "main",
  "inference",
]